<!-- login.html -->
<!DOCTYPE html>
<html lang="es">
<link rel="stylesheet" href="login.css">

<head>
<meta charset="UTF-8">
<title>Login / Registro</title>
</head>
<body>
  
  <h1 class="titulo"><b>Fake Store</b></h1>

<h2>Iniciar sesión</h2>
<form id="loginForm">
  <input type="text" id="loginUsername" placeholder="Usuario" required>
  <input type="password" id="loginPassword" placeholder="Contraseña" required>
  <button type="submit">Ingresar</button>
</form>
<p id="mensajeLogin"></p>

<hr>

<h2>Registrarse</h2>
<form id="registroForm">
  <input type="text" id="registroUsername" placeholder="Usuario" required>
  <input type="password" id="registroPassword" placeholder="Contraseña" required>
  <button type="submit">Registrarse</button>
</form>
<p id="mensajeRegistro"></p>

 
    <img class="sol" src="img/pngegg.png" alt="Sol">

  <script src="login.js"></script>
</body>
</html>

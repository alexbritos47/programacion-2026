<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi colección favorita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Mi colección favorita</h1>
    <p>Agrega tus videojuegos, películas o series favoritas.</p>

    <div class="formulario">
        <input type="text" id="nombre" placeholder="Nombre">

        <input type="text" id="descripcion" placeholder="Descripción">

        <select id="tipo">
            <option>Videojuego</option>
            <option>Película</option>
            <option>Serie</option>
            <option>Otro</option>
        </select>

        <select id="estado">
            <option>Pendiente</option>
            <option>En progreso</option>
            <option>Terminado</option>
        </select>

        <input type="number" id="calificacion" min="1" max="5" placeholder="Calificación">

        <input type="text" id="imagen" placeholder="URL de imagen">

        <button id="agregar">Agregar</button>

        <p id="error"></p>
    </div>

    <h3>Total: <span id="contador">0</span></h3>

    <select id="filtro">
        <option value="todos">Todos</option>
        <option value="Videojuego">Videojuego</option>
        <option value="Película">Película</option>
        <option value="Serie">Serie</option>
    </select>

    

    <div id="contenedor"></div>

    <script src="script.js"></script>
</body>
</html>
